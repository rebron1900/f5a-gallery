name: 提交主题
description: 提交一个新的 fcitx5-android 键盘主题
labels: ["theme-submission"]
body:
  - type: textarea
    id: theme-json
    attributes:
      label: 主题 JSON
      description: |
        粘贴完整的主题 JSON。支持两种格式：
        1. fcitx5-android 原生格式（颜色为整数，如 -526345）
        2. 本站格式（颜色为 hex 字符串，如 #F7F7F7）

        必须包含 name 和 isDark 字段，以及全部 21 个颜色 token。
      placeholder: |
        {
          "name": "我的主题",
          "isDark": true,
          "backgroundColor": -16777216,
          "barColor": -16777216,
          "keyboardColor": -16777216,
          "keyBackgroundColor": -15658735,
          "keyTextColor": -1,
          "candidateTextColor": -1,
          "candidateLabelColor": -8355712,
          "candidateCommentColor": -6710887,
          "altKeyBackgroundColor": -14474461,
          "altKeyTextColor": -3355444,
          "accentKeyBackgroundColor": -14922241,
          "accentKeyTextColor": -1,
          "keyPressHighlightColor": 436207615,
          "keyShadowColor": -16777216,
          "popupBackgroundColor": -15658735,
          "popupTextColor": -1,
          "spaceBarColor": -15658735,
          "dividerColor": -14474461,
          "clipboardEntryColor": -15658735,
          "genericActiveBackgroundColor": -14922241,
          "genericActiveForegroundColor": -1
        }
    validations:
      required: true
  - type: textarea
    id: preview-screenshot
    attributes:
      label: 预览截图（可选）
      description: 如果有主题在手机上的实际效果截图，请贴图片链接
