name: Validate Theme

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate theme JSON
        uses: actions/github-script@v7
        with:
          script: |
            const THEME_COLORS = [
              "backgroundColor", "barColor", "keyboardColor", "keyBackgroundColor",
              "keyTextColor", "candidateTextColor", "candidateLabelColor",
              "candidateCommentColor", "altKeyBackgroundColor", "altKeyTextColor",
              "accentKeyBackgroundColor", "accentKeyTextColor", "keyPressHighlightColor",
              "keyShadowColor", "popupBackgroundColor", "popupTextColor",
              "spaceBarColor", "dividerColor", "clipboardEntryColor",
              "genericActiveBackgroundColor", "genericActiveForegroundColor",
            ];

            const body = context.payload.issue.body || '';

            // Extract JSON from code block or raw
            let jsonStr = null;
            const codeBlockMatch = body.match(/```(?:json)?\s*\n?([\s\S]*?)\n?\s*```/);
            if (codeBlockMatch) jsonStr = codeBlockMatch[1].trim();
            // Fallback: match any JSON object with "name" field
            if (!jsonStr) {
              const jsonMatch = body.match(/\{[\s\S]*"name"[\s\S]*\}/);
              if (jsonMatch) jsonStr = jsonMatch[0];
            }

            if (!jsonStr) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: '❌ 未找到有效的 JSON。请在 ```json 代码块中粘贴主题 JSON。'
              });
              return;
            }

            let data;
            try {
              data = JSON.parse(jsonStr);
            } catch (e) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `❌ JSON 解析失败：\n\`\`\`\n${e.message}\n\`\`\``
              });
              return;
            }

            // Support native fcitx5-android-fx（靓企鹅版）format only
            // Gallery extension fields (author, builtin) should NOT be in the JSON
            const errors = [];
            if (!data.name || typeof data.name !== 'string') errors.push('缺少或无效的 name 字段');
            if (typeof data.isDark !== 'boolean') errors.push('缺少或无效的 isDark 字段（需要 true 或 false）');

            // Warn about gallery extension fields (not fatal, will be stripped on merge)
            if (data.author !== undefined) errors.push('请不要包含 author 字段（作者信息由系统自动记录）');
            if (data.builtin !== undefined) errors.push('请不要包含 builtin 字段');

            // backgroundImage must be null or absent (no background) or an object (with background)
            if (data.backgroundImage !== undefined && data.backgroundImage !== null && typeof data.backgroundImage !== 'object') {
              errors.push('backgroundImage 应为 null 或对象，不能是字符串');
            }
            // version should be "2.1" if present
            if (data.version !== undefined && data.version !== '2.1') {
              errors.push(`version 应为 "2.1"，当前为 "${data.version}"`);
            }

            // Colors can be in data.colors (wrapper) or directly in data (native)
            const colors = data.colors || data;
            if (typeof colors !== 'object') {
              errors.push('缺少颜色定义');
            } else {
              for (const token of THEME_COLORS) {
                if (colors[token] === undefined) errors.push(`缺少颜色: ${token}`);
              }
            }

            // Fetch existing bot comments to avoid duplicates
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const botComments = comments.data.filter(c => c.user.type === 'Bot');

            if (errors.length > 0) {
              const failBody = `❌ 主题校验失败：\n\n${errors.map(e => `- ${e}`).join('\n')}\n\n请修正后重新编辑 Issue。`;
              const alreadyFailed = botComments.some(c => c.body.includes('主题校验失败'));
              if (!alreadyFailed) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: failBody,
                });
              }
            } else {
              const alreadyPassed = botComments.some(c => c.body.includes('✅ JSON 格式校验通过'));
              if (!alreadyPassed) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: '✅ JSON 格式校验通过！等待管理员审核。',
                });
              }
            }
